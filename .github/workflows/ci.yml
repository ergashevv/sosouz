name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/soso
      GEMINI_API_KEY: ci-placeholder-key
      SERPER_API_KEY: ci-placeholder-key
      NEXT_PUBLIC_SITE_URL: https://sosouz.vercel.app
      NEXT_PUBLIC_APP_URL: https://sosouz.vercel.app
      SITE_URL: https://sosouz.vercel.app
      CRON_SECRET: ci-placeholder-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
